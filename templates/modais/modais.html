<div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirmar exclusão</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Tem certeza que deseja excluir esta conta?
            </div>

            <div class="modal-footer">
                <form method="post" id="formExcluir">
                    {% csrf_token %}
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-danger">
                        Excluir
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- ------------------------------------------------------- -->

<div class="modal fade" id="modalMensagem" tabindex="-1" aria-hidden="true" {% if modal_mensagem %}data-auto-open="true"{% endif %}>
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header {% if modal_tipo == 'success' %}bg-success text-white{% elif modal_tipo == 'error' %}bg-danger text-white{% else %}bg-secondary text-white{% endif %}">
                <h5 class="modal-title">
                    {% if modal_tipo == 'success' %}
                        Sucesso
                    {% elif modal_tipo == 'error' %}
                        Erro
                    {% else %}
                        Aviso
                    {% endif %}
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                {{ modal_mensagem }}
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Fechar
                </button>
            </div>

        </div>
    </div>
</div>
