<form method="get" class="mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <div class="d-flex align-items-center gap-3 flex-wrap">

            <button
                class="titulo-toggle d-flex align-items-center gap-2"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#painelFiltrosDashboard"
                aria-expanded="true"
                aria-controls="painelFiltrosDashboard"
            >
                <span>{{ titulo_topo }}</span>
                <span class="fs-6">v</span>
            </button>

            <div class="d-flex align-items-center gap-4 radio-visao-geral">
                <div class="form-check mb-0">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="tipo_visualizacao"
                        id="tipoCaixa"
                        value="caixa"
                        {% if tipo_visualizacao == 'caixa' %}checked{% endif %}
                        onchange="this.form.submit()"
                    >
                    <label class="form-check-label" for="tipoCaixa">
                        Caixa
                    </label>
                </div>

                <div class="form-check mb-0">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="tipo_visualizacao"
                        id="tipoCompetencia"
                        value="competencia"
                        {% if tipo_visualizacao == 'competencia' %}checked{% endif %}
                        onchange="this.form.submit()"
                    >
                    <label class="form-check-label" for="tipoCompetencia">
                        Competência
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="collapse show" id="painelFiltrosDashboard">
        <div class="painel-topo">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Projeto</label>
                    <select class="form-select" disabled>
                        <option>Todos</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Departamento</label>
                    <select class="form-select" disabled>
                        <option>Todos</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Empresa</label>
                    <select class="form-select" disabled>
                        <option>Todos</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Período</label>
                    <input type="hidden" name="periodo" value="{{ periodo_selecionado }}" data-periodo-input>
                    <div class="periodo-tree" data-periodo-tree>
                        <button
                            type="button"
                            class="form-select periodo-tree-trigger"
                            data-periodo-trigger
                            aria-expanded="false"
                        >
                            {{ periodo_legenda }}
                        </button>

                        <div class="periodo-tree-menu" data-periodo-menu>
                            {% for opcao in periodo_opcoes %}
                                <button
                                    type="button"
                                    class="periodo-tree-option periodo-tree-option-{{ opcao.nivel }} {% if opcao.valor == periodo_selecionado %}active{% endif %}"
                                    data-periodo-value="{{ opcao.valor }}"
                                    data-periodo-label="{{ opcao.label }}"
                                    data-periodo-nivel="{{ opcao.nivel }}"
                                    {% if opcao.ano %}data-periodo-ano="{{ opcao.ano }}"{% endif %}
                                    {% if opcao.trimestre %}data-periodo-trimestre="{{ opcao.trimestre }}"{% endif %}
                                >
                                    {% if opcao.nivel == 'customizado' %}
                                        Selecionar periodo
                                    {% elif opcao.nivel == 'ano' %}
                                        <span class="periodo-tree-icon">+</span>
                                        <span>{{ opcao.label }}</span>
                                    {% elif opcao.nivel == 'trimestre' %}
                                        <span class="periodo-tree-icon">+</span>
                                        <span>{{ opcao.menu_label }}</span>
                                    {% else %}
                                        <span>{{ opcao.menu_label }}</span>
                                    {% endif %}
                                </button>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>

            {% if mostrar_datas_personalizadas %}
                <div class="row g-3 mt-1">
                    <div class="col-md-3 offset-md-6">
                        <label class="form-label fw-semibold">Data inicial</label>
                        <input type="date" class="form-control" name="data_inicial" value="{{ data_inicial }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Data final</label>
                        <input type="date" class="form-control" name="data_final" value="{{ data_final }}">
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-3">
                    <button type="submit" class="btn btn-primary">Aplicar período</button>
                </div>
            {% else %}
                <div class="d-flex justify-content-end mt-3">
                    <small class="text-muted">
                        Período selecionado: {{ periodo_legenda }} | Baseado em {{ tipo_visualizacao_label }}
                    </small>
                </div>
            {% endif %}
        </div>
    </div>
</form>
