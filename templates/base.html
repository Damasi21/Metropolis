{% load static %}

{% include 'modais/modais.html' %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Insight Wise B.I.{% endblock %}</title>

    <script>
        (function () {
            const temaSalvo = localStorage.getItem('metropolis-tema');
            const prefereEscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tema = temaSalvo || (prefereEscuro ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', tema);
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260531e">
</head>
<body>

    {% block nav %}
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="{% url 'home' %}">Insight Wise B.I.</a>
                {% if user.is_authenticated %}
                    <div class="d-flex align-items-center gap-2">
                        <button
                            type="button"
                            class="theme-toggle-btn"
                            id="themeToggleBtn"
                            aria-label="Alternar modo escuro"
                            title="Alternar modo escuro"
                        >
                            <span class="theme-toggle-icon" aria-hidden="true"></span>
                            <span class="theme-toggle-text">Dark</span>
                        </button>

                        <form method="post" action="{% url 'logout' %}" class="mb-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-light">Sair</button>
                        </form>
                    </div>
                {% endif %}
            </div>
        </nav>
    {% endblock %}

    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/dashboard.js' %}?v=20260528a"></script>
    
</body>
</html>
