{% load static %}

{% include 'modais/modais.html' %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Metrópolis{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    {% block nav %}
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="{% url 'home' %}">Metrópolis</a>
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}" class="mb-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-light">Sair</button>
                    </form>
                {% endif %}
            </div>
        </nav>
    {% endblock %}

    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
    
</body>
</html>
